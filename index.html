            <span class="eyebrow">Google-ready AI product site</span>
            <h1>One AI workspace with sign-in, settings, skills, and software control.</h1>
            <p>Orilo is a richer product shell for an all-in-one AI agent. It now includes a sign-in experience, multi-platform login entry points, settings controls, software authorization concepts, a collapsible workspace sidebar, skills, workflows, and global-ready product structure.</p>

    <section class="section" id="product">
      <div class="container">
        <span class="eyebrow">Product structure</span>
        <h2 class="title">A stronger shell for the product you described.</h2>
        <p class="copy">This version is designed to feel more like a real software product: entry, profile state, settings, sidebar navigation, skills, integrations, authorization, workflows, and workspace controls. It is still a front-end prototype, but it now looks much closer to the real app direction.</p>
        <div class="card-grid">
          <div class="card"><div class="icon">01</div><h3>Workspace login flow</h3><p>Dedicated sign-in entry points for Google, GitHub, email, and guest demo, plus visible logout and provider state inside the workspace.</p></div>
          <div class="card"><div class="icon">02</div><h3>Settings and personalization</h3><p>Language switch, theme switch, sidebar collapse, timezone, notifications, privacy preferences, and remembered interface state.</p></div>
          <div class="card"><div class="icon">03</div><h3>Skills and authorization</h3><p>Separate areas for skills, connected apps, scopes, authorization status, and revocation concepts so the app feels more complete.</p></div>
        </div>
      </div>
    </section>

    <section class="section" id="settings">
      <div class="container">
        <span class="eyebrow">How it works</span>
        <h2 class="title">More than a landing page. More like a real control layer.</h2>
        <div class="story-grid">
          <div class="story panel">
            <h3>Settings that feel like software</h3>
            <p>Instead of only showing marketing copy, the product now expresses real interface controls users expect in a modern app.</p>
            <div class="flow">
              <div class="flow-item"><div><strong>Theme mode</strong><span>Switch between light, dark, and auto.</span></div><div class="flow-label">UI state</div></div>
              <div class="flow-item"><div><strong>Language mode</strong><span>Toggle between English and Chinese interface text in the prototype.</span></div><div class="flow-label">i18n</div></div>
              <div class="flow-item"><div><strong>Sidebar behavior</strong><span>Collapse and expand the left navigation like a real product workspace.</span></div><div class="flow-label">Layout</div></div>
            </div>
          </div>
          <div class="story panel">
            <h3>Authorization and skills</h3>
            <p>The product shell now includes areas for skills, integrations, app scopes, authorization status, and richer workspace navigation.</p>
            <div class="flow">
              <div class="flow-item"><div><strong>Skill catalog</strong><span>Show what the AI can do across browser tasks, media, automation, research, and support.</span></div><div class="flow-label">Capabilities</div></div>
              <div class="flow-item"><div><strong>Software access</strong><span>Expose Google, GitHub, Slack, Notion, Drive, and more through a dedicated authorization area.</span></div><div class="flow-label">Apps</div></div>
              <div class="flow-item"><div><strong>Session controls</strong><span>Profile chip, login state, and sign out make the workspace feel believable.</span></div><div class="flow-label">Identity</div></div>
            </div>
          </div>

        <h2 class="title">Start free, then charge for more power.</h2>
        <p class="copy">The product still follows the same logic: a real free tier, then later paid expansion for more runtime, stronger models, more authorizations, more automations, and team-grade controls.</p>
        <div class="plan-grid">
          <div class="plan featured"><div class="badge">Live concept</div><h3>Free beta</h3><p>Useful enough to attract users and demonstrate product value.</p><div class="price">$0 <span>/ to start</span></div><div class="sub">Daily limits, sign-in shell, workspace settings, and product structure.</div><ul><li>Core workspace experience</li><li>Standard skills and authorizations</li><li>Theme and language settings</li><li>Basic media and workflow credits</li></ul></div>
          <div class="plan"><div class="badge">Later</div><h3>Pro</h3><p>For serious creators and operators.</p><div class="price">TBD <span>/ later</span></div><div class="sub">More runtime, stronger models, deeper integrations.</div><ul><li>Premium agent models</li><li>More connected apps</li><li>Longer workflows</li><li>Priority support</li></ul></div>
          <div class="plan"><div class="badge">Scale</div><h3>Team</h3><p>For shared workspaces and approval chains.</p><div class="price">TBD <span>/ later</span></div><div class="sub">Shared governance, pooled usage, and admin controls.</div><ul><li>Team roles and permissions</li><li>Shared integrations</li><li>Approval rules</li><li>Workspace audit visibility</li></ul></div>
        </div>
      </div>
    </section>

    <section class="section" id="faq">
      <div class="container">
        <span class="eyebrow">FAQ</span>
        <h2 class="title">What is live now, and what still needs backend work.</h2>
        <div class="faq-grid">
          <div class="faq"><h4>Is Google indexing fully done?</h4><p>The site can now be indexed more cleanly because it has robots, sitemap, canonical, and structured metadata. Full Search Console verification still needs your Google Search Console ownership step.</p></div>
          <div class="faq"><h4>Is the login real OAuth already?</h4><p>Not yet. The current site can present a realistic login UI and remembered session state in the browser, but real Google and GitHub OAuth still require backend implementation.</p></div>
          <div class="faq"><h4>Can the app really authorize software?</h4><p>The interface now includes authorization sections and app scope concepts, but actual token exchange and connector logic still belong to the next backend phase.</p></div>
          <div class="faq"><h4>What changed most in this pass?</h4><p>The workspace now feels much more like a real product: sign-in, settings, theme, language, sidebar behavior, skills, software authorization, and richer navigation.</p></div>
        </div>
      </div>
    </section>
